spring:
  datasource:
    url: jdbc:h2:mem:cabinet;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      # On tests the schema is generated from the JPA entities (Flyway is disabled).
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-key-for-pt28-cabinet-medical-unit-tests-256bits-minimum
    access-token-expiration-ms: 3600000
    refresh-token-expiration-ms: 604800000
    issuer: pt28-cabinet-medical-test
  storage:
    upload-dir: ./build/test-uploads
  seed:
    enabled: true
