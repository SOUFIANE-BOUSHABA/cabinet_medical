spring:
  application:
    name: cabinet-medical
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cabinet_medical}
    username: ${SPRING_DATASOURCE_USERNAME:cabinet_user}
    password: ${SPRING_DATASOURCE_PASSWORD:cabinet_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema. Hibernate only maps to it.
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080

# Application specific configuration
app:
  jwt:
    # Override in production via APP_JWT_SECRET (must be at least 32 chars for HS256)
    secret: ${APP_JWT_SECRET:pt28-cabinet-medical-very-secret-key-change-me-in-production-256bits}
    access-token-expiration-ms: ${APP_JWT_ACCESS_EXPIRATION:3600000}      # 1 hour
    refresh-token-expiration-ms: ${APP_JWT_REFRESH_EXPIRATION:604800000}  # 7 days
    issuer: pt28-cabinet-medical
  storage:
    upload-dir: ${APP_UPLOAD_DIR:./uploads}
  seed:
    enabled: ${APP_SEED_ENABLED:true}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
